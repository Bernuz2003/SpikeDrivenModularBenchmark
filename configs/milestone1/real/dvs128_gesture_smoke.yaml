experiment:
  name: dvs128_gesture_smoke
  milestone: M1
  seed: 42

dataset:
  name: dvs128_gesture
  root: /path/to/datasets/tonic
  height: 128
  width: 128
  num_classes: 11
  num_train: 256
  num_val: 64

encoder:
  name: fixed_time_binary
  T: 8
  polarity_channels: true
  binarize: true
  time_reference: sample_start

model:
  feature_extractor:
    name: conv_bn_lif_maxpool
    channels: [16, 32]
    residual: none
    output_format: tokens
  attention:
    name: identity
  head:
    name: temporal_spike_voting
    terminal_readout: true

training:
  epochs: 1
  batch_size: 8
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  surrogate_alpha: 4
  profile_batches: 1
  device: auto
  num_workers: 0

evaluation:
  robustness:
    enabled: false

logging:
  save_layer_metrics: true
  save_frequency_metrics: true
  save_temporal_metrics: true
  output_dir: runs/milestone1/dvs128_gesture_smoke
