experiment:
  name: cifar10_dvs_m1_diagnostic
  milestone: M1
  seed: 42

dataset:
  name: cifar10_dvs
  root: /path/to/datasets/tonic
  height: 128
  width: 128
  num_classes: 10
  num_train: 2000
  num_val: 500

encoder:
  name: fixed_time_binary
  T: 8
  polarity_channels: true
  binarize: true
  time_reference: sample_start

model:
  feature_extractor:
    name: conv_bn_lif_maxpool
    channels: [32, 64]
    residual: none
    output_format: tokens
  attention:
    name: identity
  head:
    name: temporal_spike_voting
    terminal_readout: true

training:
  epochs: 5
  batch_size: 16
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  surrogate_alpha: 4
  profile_batches: 2
  device: auto
  num_workers: 2

evaluation:
  robustness:
    enabled: true
    event_drop_rates: [0.1, 0.2, 0.3]
    temporal_jitter: [0.05]
    polarity_drop: [0.2]
    timestep_shuffle: true
    early_accuracy: true

logging:
  save_layer_metrics: true
  save_frequency_metrics: true
  save_temporal_metrics: true
  output_dir: runs/milestone1/cifar10_dvs_m1_diagnostic
