experiment:
  name: robust_timestep_shuffle
  benchmark: pre_attention
  seed: 42

dataset:
  name: cifar10_dvs
  root: ${PREATTN_DATA_ROOT}
  height: 128
  width: 128
  num_classes: 10
  num_train: null
  num_val: null
  augmentations:
    timestep_shuffle: true

encoder:
  name: fixed_time_binary
  T: 6
  polarity_channels: true
  binarize: true

model:
  feature_extractor:
    name: conv_bn_lif_maxpool
    channels: [16, 32]
    residual: none
    output_format: tokens
  attention:
    name: identity
  head:
    name: last_timestep_spike_readout
    terminal_readout: true

training:
  epochs: 100
  batch_size: 16
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  min_lr: 0.00001
  pin_memory: true
  surrogate_alpha: 4
  profile_batches: 1
  device: auto
  num_workers: 4

logging:
  save_layer_metrics: true
  save_frequency_metrics: true
  save_temporal_metrics: true
  output_dir: ${PREATTN_RUNS_ROOT}/cifar10_dvs/robust_timestep_shuffle
