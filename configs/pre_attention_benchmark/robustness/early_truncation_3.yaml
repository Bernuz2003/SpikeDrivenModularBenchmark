experiment:
  name: robust_early_truncation_3
  benchmark: pre_attention
  seed: 42

dataset:
  name: cifar10_dvs
  root: ${PREATTN_DATA_ROOT}
  height: 128
  width: 128
  num_classes: 10
  num_train: null
  num_val: null
  cache_encoded: true
  cache_dtype: uint8
  augmentations:
    early_truncation: 3

encoder:
  name: fixed_time_binary
  T: 16
  polarity_channels: true
  binarize: true
  pixel_threshold: 3

model:
  feature_extractor:
    name: sps_like_ms
    channels: [32, 64, 128]
    residual: ms
    output_format: tokens
  attention:
    name: identity
  head:
    name: spatio_temporal_avg_readout

training:
  epochs: 60
  batch_size: 16
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  min_lr: 0.00001
  pin_memory: true
  surrogate_alpha: 4
  profile_batches: 1
  device: auto
  num_workers: 4

logging:
  output_dir: ${PREATTN_RUNS_ROOT}/cifar10_dvs/robust_early_truncation_3
