experiment:
  name: head_spatial_pooling_threshold
  benchmark: pre_attention
  seed: 42

dataset:
  name: cifar10_dvs
  root: ${PREATTN_DATA_ROOT}
  height: 128
  width: 128
  num_classes: 10
  num_train: 512
  num_val: 128

encoder:
  name: fixed_time_binary
  T: 8
  polarity_channels: true
  binarize: true

model:
  feature_extractor:
    name: conv_bn_maxpool_lif
    channels: [8, 16]
    residual: none
    output_format: tokens
  attention:
    name: identity
  head:
    name: spatial_pooling_threshold
    terminal_readout: true

training:
  epochs: 2
  batch_size: 16
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  surrogate_alpha: 4
  profile_batches: 1
  device: auto
  num_workers: 0

logging:
  save_layer_metrics: true
  save_frequency_metrics: true
  save_temporal_metrics: true
  output_dir: ${PREATTN_RUNS_ROOT}/head_spatial_pooling_threshold
